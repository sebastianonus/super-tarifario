<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&display=swap");

      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #0f1f3a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        background:
          radial-gradient(circle at top left, rgba(0, 201, 206, 0.18), transparent 20rem),
          radial-gradient(circle at top right, rgba(0, 9, 53, 0.12), transparent 24rem),
          #f4f7fb;
      }

      main {
        width: min(100%, 34rem);
        padding: 1.25rem;
        border: 1px solid rgba(15, 31, 58, 0.08);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 1rem 2.5rem rgba(15, 31, 58, 0.08);
      }

      h1 {
        margin: 0 0 0.35rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
        line-height: 1.1;
        font-family: "Raleway", "Segoe UI", sans-serif;
        font-weight: 800;
      }

      p {
        margin: 0 0 1rem;
        color: #52627d;
      }

      nav {
        display: grid;
        gap: 0.75rem;
      }

      a {
        display: block;
        padding: 1rem;
        border-radius: 0.9rem;
        text-decoration: none;
        font-family: "Raleway", "Segoe UI", sans-serif;
        font-weight: 700;
        text-align: center;
        border: 1px solid rgba(15, 31, 58, 0.1);
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          border-color 140ms ease;
      }

      a:hover {
        transform: translateY(-1px);
      }

      .item {
        background: #000935;
        border-color: #000935;
        color: #ffffff;
        box-shadow: 0 0.7rem 1.8rem rgba(0, 9, 53, 0.18);
      }

      .modulo {
        background: #00c9ce;
        border-color: #00c9ce;
        color: #062a34;
        box-shadow: 0 0.7rem 1.8rem rgba(0, 201, 206, 0.18);
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="landing-title"></h1>
      <p id="landing-subtitle"></p>
      <nav id="landing-nav" aria-label="">
        <a id="landing-item-link" class="item" href="/item"></a>
        <a id="landing-modulo-link" class="modulo" href="/modulo"></a>
      </nav>
    </main>
    <script type="module" src="/src/landing.ts"></script>
  </body>
</html>
